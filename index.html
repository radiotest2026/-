        function Slider() {
            const [index, setIndex] = useState(0);
            const timerRef = useRef(null);

        function ProgramsSlider() {
            const [progIndex, setProgIndex] = useState(0);
            const [zoomedIndex, setZoomedIndex] = useState(null);
            const images = [
                "https://e.top4top.io/p_3856hfvtk0.png",
                "https://j.top4top.io/p_3856j6h3t0.png",
                "https://k.top4top.io/p_3856i9uyv0.png"
            ];
            
            const touchStartX = useRef(0);
            const touchEndX = useRef(0);
            const zoomTouchStartX = useRef(0);
            const zoomTouchEndX = useRef(0);

            useEffect(() => {
                const timer = setInterval(() => {
                    if (zoomedIndex === null) {
                        setProgIndex((prev) => (prev + 1) % images.length);
                    }
                }, 4000);
                return () => clearInterval(timer);
            }, [images.length, zoomedIndex]);

            const handleTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
            const handleTouchMove = (e) => { touchEndX.current = e.touches[0].clientX; };
            const handleTouchEnd = () => {
                if (!touchStartX.current || !touchEndX.current) return;
                const distance = touchStartX.current - touchEndX.current;
                const minSwipeDistance = 40;
                if (distance > minSwipeDistance) setProgIndex((prev) => (prev + 1) % images.length);
                else if (distance < -minSwipeDistance) setProgIndex((prev) => (prev - 1 + images.length) % images.length);
                touchStartX.current = 0; touchEndX.current = 0;
            };

            const handleZoomTouchStart = (e) => { zoomTouchStartX.current = e.touches[0].clientX; };
            const handleZoomTouchMove = (e) => { zoomTouchEndX.current = e.touches[0].clientX; };

                if (!zoomTouchStartX.current || !zoomTouchEndX.current) return;
                const distance = zoomTouchStartX.current - zoomTouchEndX.current;
                const minSwipeDistance = 40;
                if (distance > minSwipeDistance) setZoomedIndex((prev) => (prev + 1) % images.length);

                zoomTouchStartX.current = 0; zoomTouchEndX.current = 0;
            };

            return createElement('div', { className: 'mb-4' },

                    className: 'programs-slider-container shadow-md bg-white relative overflow-hidden',

                                    src: imgUrl, 
                                    className: 'w-full h-full object-cover cursor-pointer',

                                })
