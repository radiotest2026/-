        function Clock() {
            const [time, setTime] = useState(new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }));
            useEffect(() => {
                const timer = setInterval(() => {
                    setTime(new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }));
                }, 60000);
                return () => clearInterval(timer);
            }, []);
            return createElement('div', { className: 'flex items-center gap-1' },
                createElement('span', { className: 'animate-slow-fade' }, '🕒'),
                createElement('span', { className: 'text-[10px] font-bold text-white/80' }, time.replace('AM', 'ص').replace('PM', 'م'))
            );
        }

        function LiveTemp() {
            const [isDay, setIsDay] = useState(true);
            useEffect(() => {
                const checkTime = () => {
                    const hour = new Date().getHours();
                    const minutes = new Date().getMinutes();
                    const currentTime = hour + minutes / 60;
                    setIsDay(currentTime >= 5 && currentTime < 19.5);
                };
                checkTime();
                const timer = setInterval(checkTime, 60000);
                return () => clearInterval(timer);
            }, []);
            return createElement('div', { className: 'flex items-center gap-1 relative' },
                isDay && createElement('span', { className: 'absolute -top-3 right-0 animate-cloud-move' }, '☁️'),
                createElement('div', { className: isDay ? 'animate-sun-rotate animate-sun-glow-effect animate-sun-pulse' : '' },
                    isDay ? '☀️' : '🌙'
                ),
                createElement('span', { className: 'font-bold text-[12px]' }, '29°')
            );
        }
