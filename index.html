        function Slider() {
            const [index, setIndex] = useState(0);
            const sliderNews = sliderData;
            const timerRef = useRef(null);

            const nextSlide = (e) => {
                if(e) e.stopPropagation();
                setIndex((prev) => (prev + 1) % sliderNews.length);
            };

            const prevSlide = (e) => {
                if(e) e.stopPropagation();
                setIndex((prev) => (prev - 1 + sliderNews.length) % sliderNews.length);
            };

            useEffect(() => {
                timerRef.current = setInterval(() => {
                    setIndex((prev) => (prev + 1) % sliderNews.length);
                }, 4000);
                return () => clearInterval(timerRef.current);
            }, [sliderNews.length]);

            return createElement('div', { className: 'slider-container' },
                createElement('button', { className: 'nav-button prev-btn', onClick: prevSlide }, '▶'),
                createElement('button', { className: 'nav-button next-btn', onClick: nextSlide }, '◀'),
                
                createElement('div', { className: 'slider-wrapper', style: { transform: `translateX(${index * 100}%)` } },
                    sliderNews.map((news) => createElement('div', { key: news.id, className: 'slider-item', onClick: () => window.open(news.link, '_blank') },
                        createElement('div', { className: 'bg-white h-full rounded-2xl shadow-lg border border-gray-100 overflow-hidden relative' },

                                createElement('div', { className: 'absolute top-2 right-2 bg-red-600 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-md z-10' }, news.program)
                            ),
                            createElement('div', { className: 'p-3' },
                                createElement('h2', { className: 'font-bold text-[18px] text-gray-900 leading-snug mt-1' }, news.title)
                            )
                        )
                    ))
                )
            );
        }

        function Slider() {

            const sliderNews = sliderData;

            const nextSlide = (e) => {
                if(e) e.stopPropagation();
                setIndex((prev) => (prev + 1) % sliderNews.length);
            };

            const prevSlide = (e) => {
                if(e) e.stopPropagation();
                setIndex((prev) => (prev - 1 + sliderNews.length) % sliderNews.length);
            };

            useEffect(() => {
                timerRef.current = setInterval(() => {
                    setIndex((prev) => (prev + 1) % sliderNews.length);
                }, 4000);
                return () => clearInterval(timerRef.current);
            }, [sliderNews.length]);

            return createElement('div', { className: 'slider-container' },
                createElement('button', { className: 'nav-button prev-btn', onClick: prevSlide }, '▶'),
                createElement('button', { className: 'nav-button next-btn', onClick: nextSlide }, '◀'),

                                ),

                                createElement('div', { className: 'text-[9px] text-gray-400 mt-0.5' }, news.time)
                            )
                        ),
                        index === 2 ? createElement(AdBanner) : null,
