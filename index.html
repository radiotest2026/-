                return () => clearInterval(timer);
            }, []);

                createElement('span', { className: 'animate-slow-fade' }, '🕒'),
                createElement('span', { className: 'text-[10px] font-bold text-white/80' }, time.replace('AM', 'ص').replace('PM', 'م'))
            );
        }

        function LiveTemp() {
            const [isDay, setIsDay] = useState(true);

                return () => clearInterval(timer);

        function SisiComments() {
            useEffect(() => {
                import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js").then(({ initializeApp }) => {
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js").then(({ getAuth, signInAnonymously, signInWithCustomToken }) => {
                        import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js").then(({ getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp }) => {
                            try {
                                const firebaseConfig = JSON.parse(__firebase_config);
                                const app = initializeApp(firebaseConfig);
                                const auth = getAuth(app);
                                const db = getFirestore(app);
                                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                                const commentsColRef = collection(db, 'artifacts', appId, 'public', 'data', 'sisi_july23_comments_v1');

                                const checkCommentLock = () => {
                                    const savedAuthor = localStorage.getItem('sisi_july23_author_name');
                                    if (localStorage.getItem('sisi_july23_locked_device')) {
                                        const formWrapper = document.getElementById('comment-form-wrapper');
                                        const successMsg = document.getElementById('success-thankyou-msg');
                                        const titleEl = document.getElementById('thankyou-title');
                                        const descEl = document.getElementById('thankyou-desc');
                                        if (formWrapper) formWrapper.style.display = 'none';
                                        if (successMsg) successMsg.style.display = 'block';
                                        if (titleEl && savedAuthor) titleEl.textContent = `شكراً لتفاعلك معنا يا ${savedAuthor}!`;
                                    }
                                };

                                window.postComment = async function() {
                                    if (localStorage.getItem('sisi_july23_locked_device')) {
                                        return;
                                    }
                                    const authorInput = document.getElementById('comment-author');
                                    const textInput = document.getElementById('comment-text');
                                    if (!authorInput || !textInput) return;
                                    const author = authorInput.value.trim();
                                    const text = textInput.value.trim();
                                    if (!author || !text) {
                                        alert('يرجى كتابة الاسم ومحتوى التعليق أولاً.');
                                        return;
                                    }
                                    try {
                                        localStorage.setItem('sisi_july23_locked_device', 'true');
                                        localStorage.setItem('sisi_july23_author_name', author);
                                        checkCommentLock();
                                        await addDoc(commentsColRef, {
                                            author: author,
                                            text: text,
                                            createdAt: serverTimestamp()
                                        });
                                        authorInput.value = '';
                                        textInput.value = '';
                                    } catch (e) {}
                                };

                                const initAuth = async () => {
                                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                        await signInWithCustomToken(auth, __initial_auth_token);
                                    } else {
                                        await signInAnonymously(auth);
                                    }
                                };

                                initAuth().then(() => {
                                    checkCommentLock();
                                    const q = query(commentsColRef, orderBy('createdAt', 'desc'));
                                    onSnapshot(q, (snapshot) => {
                                        checkCommentLock();
                                        const container = document.getElementById('comments-container');
                                        const countSpan = document.getElementById('comments-count');
                                        if (!container || !countSpan) return;
                                        if (snapshot.empty) {
                                            container.innerHTML = '<p class="text-[11px] text-gray-400 text-center py-2">لا توجد تعليقات حالياً، كن أول المتحدثين!</p>';

            function escapeHtml(text) {
                if (!text) return '';
                const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };

                    )

        }

        function Slider() {

            const timerRef = useRef(null);
            const nextSlide = (e) => { if(e) e.stopPropagation(); setIndex((prev) => (prev + 1) % sliderNews.length); };
            const prevSlide = (e) => { if(e) e.stopPropagation(); setIndex((prev) => (prev - 1 + sliderNews.length) % sliderNews.length); };
            useEffect(() => {
                timerRef.current = setInterval(() => { setIndex((prev) => (prev + 1) % sliderNews.length); }, 4000);
                return () => clearInterval(timerRef.current);
            }, []);
            return createElement('div', { className: 'slider-container' },
                createElement('button', { className: 'nav-button prev-btn', onClick: prevSlide }, '▶'),
                createElement('button', { className: 'nav-button next-btn', onClick: nextSlide }, '◀'),

                    createElement('div', { className: 'max-w-4xl mx-auto flex items-center justify-between' },
                        createElement('div', { className: 'flex items-center gap-2' },

                            createElement('a', { href: 'https://www.maspero.eg/stream/11', target: '_blank', className: 'relative bg-yellow-500 text-blue-950 px-2 py-0.5 rounded-full text-[8px] font-bold active-scale flex items-center gap-1' }, 
                                createElement('svg', { className: 'w-3 h-3 text-red-600 fill-current animate-play-blink', viewBox: '0 0 24 24' }, createElement('path', { d: 'M8 5v14l11-7z' })),
                                'استمع الآن'
                            ),
                            createElement(Clock)
                        ),
                        createElement('a', { href: 'https://www.facebook.com/share/1bzDzdVHfh/', target: '_blank' }, createElement('img', { src: 'https://i.postimg.cc/B61C0pPF/images.png', className: 'w-6 h-6 rounded-full object-cover border border-white/20', referrerPolicy: 'no-referrer' }))
                    )
                ),
                createElement('main', { className: 'flex-grow p-3 max-w-4xl mx-auto w-full' },
                    createElement(Slider),
                    createElement(LiveProgram),
                    createElement('div', { className: 'desktop-grid' },
                        displayedNews.map((news) => createElement('div', { key: news.id, className: 'news-card-wrapper' },
                            createElement('div', { onClick: () => window.open(news.link, '_blank'), className: 'bg-white p-3 rounded-2xl mb-3 shadow-sm flex items-center gap-3 active-scale cursor-pointer border border-gray-200 h-full' },
                                createElement('div', { className: 'relative p-0.5 rounded-full animate-red-ring-pulse shrink-0' }, createElement('img', { src: news.image, className: 'w-14 h-14 rounded-full object-cover', referrerPolicy: 'no-referrer' })),
                                createElement('div', { className: 'flex-1 overflow-hidden' },
                                    createElement('div', { className: 'flex items-center gap-1.5 mb-0.5' }, createElement('div', { className: 'w-1.5 h-1.5 rounded-full bg-red-600 animate-blink' }), createElement('span', { className: 'bg-red-600 text-white text-[9px] px-1.5 py-0.5 rounded' }, news.program)),
                                    createElement('h2', { className: 'font-bold text-sm leading-tight text-gray-800' }, news.title),
                                    createElement('div', { className: 'text-[9px] text-gray-400 mt-0.5' }, news.time)
                                )
                            )
                        ))
                    ),
                    !showAll && createElement('button', { onClick: () => setShowAll(true), className: 'w-full bg-blue-900 text-white py-3 rounded-2xl font-black text-sm mb-6 shadow-lg active:scale-95 transition-all' }, 'عرض المزيد من الأخبار')
